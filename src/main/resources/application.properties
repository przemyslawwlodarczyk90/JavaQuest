spring.application.name=Java Quest

# Domyslnie WYLACZAMY auto-konfiguracje Spring Security dla CALEGO projektu. Powod: dodanie
# spring-boot-starter-security (potrzebne dla rozdzialu _24_spring_security) sprawia, ze KAZDA
# aplikacja Spring Boot w tym repo (embedded Tomcat + realne zadania HTTP) domyslnie zabezpiecza
# WSZYSTKIE endpointy (401 Unauthorized) - dokladnie ta sama kategoria regresji co ze springdoc
# w _22_spring_web (zobacz CLAUDE.md), zweryfikowane empirycznie na _22_spring_web/Lesson19
# (kapszton), ktory zaczal zwracac 401 zamiast 200/201/404 po dodaniu tego startera.
# _24_spring_security musi jawnie NADPISAC ta wlasciwosc W SWOICH WLASNYCH Properties
# (spring.autoconfigure.exclude= - pusta wartosc), zeby faktycznie demonstrowac Spring Security.
#
# ROZSZERZONE 2026-07-20 (rozdzial _29_spring_reactive): wymuszenie WebApplicationType.REACTIVE
# (np. Lesson09_WebFluxVsSpringMvc) odslania REAKTYWNY odpowiednik TEJ SAMEJ pulapki - Spring
# Security ma OSOBNA auto-konfiguracje dla WebFlux (ReactiveSecurityAutoConfiguration/
# ReactiveUserDetailsServiceAutoConfiguration w pakiecie security.reactive, NIE security.servlet) -
# wykluczenie TYLKO servletowej wersji NIE WYSTARCZYLO, dalo 401 Unauthorized na KAZDYM
# reaktywnym endpoincie. Lekcje _29_spring_reactive/Lesson14_ReactiveSecurity musza jawnie
# PRZYWROCIC te wlasciwosc (tak jak _24_spring_security), zeby faktycznie demonstrowac
# zabezpieczenia WebFlux.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.reactive.ReactiveManagementWebSecurityAutoConfiguration
