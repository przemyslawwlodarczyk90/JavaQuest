spring.application.name=Java Quest

# Domyslnie WYLACZAMY auto-konfiguracje Spring Security dla CALEGO projektu. Powod: dodanie
# spring-boot-starter-security (potrzebne dla rozdzialu _24_spring_security) sprawia, ze KAZDA
# aplikacja Spring Boot w tym repo (embedded Tomcat + realne zadania HTTP) domyslnie zabezpiecza
# WSZYSTKIE endpointy (401 Unauthorized) - dokladnie ta sama kategoria regresji co ze springdoc
# w _22_spring_web (zobacz CLAUDE.md), zweryfikowane empirycznie na _22_spring_web/Lesson19
# (kapszton), ktory zaczal zwracac 401 zamiast 200/201/404 po dodaniu tego startera.
# _24_spring_security musi jawnie NADPISAC ta wlasciwosc W SWOICH WLASNYCH Properties
# (spring.autoconfigure.exclude= - pusta wartosc), zeby faktycznie demonstrowac Spring Security.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
